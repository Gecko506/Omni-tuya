name: Publish v0.2.0 release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v0.2.0 --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 && exit 0
          gh release create v0.2.0 \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Omni Tuya Local v0.2.0" \
            --notes "Device-focused setup for Omni Tuya Local.

- Removes the legacy all-devices hub path from the new setup flow.
- Tuya Cloud API is used only to import device metadata: ID, local key, product, category, suggested entity domain and real-world device type.
- The user should normally only enter or confirm the local IP for LAN control.
- Adds export domains: fan, binary_sensor, button, number, vacuum, alarm_control_panel and humidifier.
- Adds real-world device types such as coffee maker, kitchen, robot vacuum, alarm kit, siren, sensors, appliances, pet feeder, irrigation, valve and pump.
- Adds services set_device_domain and set_device_type.
- Keeps local LAN control through TinyTuya."
