scan_network:
  name: Scan network
  description: Discover local Tuya devices and update known IP addresses.

sync_cloud:
  name: Sync cloud
  description: Import device IDs and local keys from Tuya IoT Cloud. Credentials are optional if already saved in the integration.
  fields:
    api_key:
      required: false
      selector:
        text:
    api_secret:
      required: false
      selector:
        text:
          type: password
    region:
      default: us
      selector:
        select:
          options:
            - us
            - eu
            - cn
            - in
    device_id:
      required: false
      selector:
        text:

reload_devices:
  name: Reload devices
  description: Reload stored devices and refresh entities.

diagnostics:
  name: Diagnostics
  description: Return integration version, build number and stored device count.
